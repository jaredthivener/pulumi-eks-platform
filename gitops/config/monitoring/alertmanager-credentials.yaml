---
# ClusterSecretStore – connects External Secrets Operator to AWS Secrets Manager
#
# This store uses the EKS Pod Identity credentials injected into the
# external-secrets-controller pod (no IRSA annotation needed).
#
# The IAM role for ESO must have secretsmanager:GetSecretValue permission.
# Create secrets in AWS Secrets Manager at:
#   eks-platform/alertmanager/slack-webhook-url    ← Slack incoming webhook URL
#   eks-platform/alertmanager/pagerduty-routing-key ← PagerDuty v2 routing key
#
# ─────────────────────────────────────────────────────────────────────────────
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
  annotations:
    argocd.argoproj.io/sync-wave: "0"   # must exist before ExternalSecrets reference it
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      # auth omitted – ESO uses Pod Identity credentials from the mounted token
---
# ExternalSecret – Grafana admin credentials
# Creates a Kubernetes Secret referenced by kube-prometheus-stack via grafana.admin.existingSecret.
# Create in AWS Secrets Manager:
#   eks-platform/grafana/admin-user     ← admin username (e.g. "admin")
#   eks-platform/grafana/admin-password ← strong random password
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-admin-credentials
  namespace: monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: grafana-admin-credentials
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    - secretKey: admin-user
      remoteRef:
        key: eks-platform/grafana/admin-user
    - secretKey: admin-password
      remoteRef:
        key: eks-platform/grafana/admin-password
---
# ExternalSecret – pulls alertmanager credentials from AWS Secrets Manager
# Alertmanager mounts this Secret as a volume at /etc/alertmanager/secrets/
# (configured via alertmanagerSpec.secrets in kube-prometheus-stack values).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: alertmanager-credentials
  namespace: monitoring
  annotations:
    argocd.argoproj.io/sync-wave: "1"   # after ClusterSecretStore is ready
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: aws-secrets-manager
  target:
    name: alertmanager-credentials          # Kubernetes Secret name (referenced in kube-prometheus-stack)
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    - secretKey: slack-webhook-url          # file name mounted under /etc/alertmanager/secrets/
      remoteRef:
        key: eks-platform/alertmanager/slack-webhook-url
    - secretKey: pagerduty-key             # file name mounted under /etc/alertmanager/secrets/
      remoteRef:
        key: eks-platform/alertmanager/pagerduty-routing-key
