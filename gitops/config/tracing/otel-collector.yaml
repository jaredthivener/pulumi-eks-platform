# OpenTelemetryCollector CR -- unified logs + metrics + traces pipeline
#
# Replaces Fluent-Bit. Runs as a DaemonSet (one pod per node) so the filelog
# receiver can tail /var/log/pods on the host filesystem.
#
# Signal flow:
#
#  Node log files  -->  filelog receiver  -->  k8sattributes  -->  loki
#  App OTLP:
#    traces   -->  tail_sampling  -->  otlp/jaeger
#    logs     -->  k8sattributes  -->  loki
#    metrics  -->  resource       -->  prometheusremotewrite
#
# Image: contrib distribution -- includes filelog, loki exporter, k8sattributes
# RBAC:  gitops/config/tracing/rbac.yaml grants get/list/watch on pods/ns/nodes
---
apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: otel-collector
  namespace: tracing
spec:
  # DaemonSet: one collector per node to access host /var/log/pods
  mode: DaemonSet

  # Contrib distribution -- core image lacks filelog + loki exporter
  image: ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-contrib:0.119.0

  # Tolerate all node taints so DaemonSet runs on every node
  tolerations:
    - operator: Exists

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      memory: 256Mi

  # Host log paths required by filelog receiver
  volumes:
    - name: varlogpods
      hostPath:
        path: /var/log/pods
    - name: varlibdockercontainers
      hostPath:
        path: /var/lib/docker/containers

  volumeMounts:
    - name: varlogpods
      mountPath: /var/log/pods
      readOnly: true
    - name: varlibdockercontainers
      mountPath: /var/lib/docker/containers
      readOnly: true

  observability:
    metrics:
      enableMetrics: true

  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: "0.0.0.0:4317"
          http:
            endpoint: "0.0.0.0:4318"

      # Node log files -- tails every container log on the host
      filelog:
        include:
          - /var/log/pods/*/*/*.log
        exclude:
          # Avoid tailing the collector's own logs (infinite loop)
          - /var/log/pods/tracing_otel-collector*/*/*.log
        include_file_path: true
        include_file_name: false
        operators:
          - type: router
            id: get-format
            routes:
              - output: parser-docker
                expr: 'body matches "^\\{"'
              - output: parser-crio
                expr: 'body matches "^[^ Z]+ "'
            default: parser-containerd
          - type: regex_parser
            id: parser-crio
            regex: '^(?P<time>[^ Z]+) (?P<stream>stdout|stderr) (?P<logtag>[^ ]*) ?(?P<log>.*)$'
            output: extract-metadata-from-filepath
            timestamp:
              parse_from: attributes.time
              layout_type: gotime
              layout: '2006-01-02T15:04:05.000000000-07:00'
          - type: json_parser
            id: parser-docker
            output: extract-metadata-from-filepath
            timestamp:
              parse_from: attributes.time
              layout: '%Y-%m-%dT%H:%M:%S.%LZ'
          - type: regex_parser
            id: parser-containerd
            regex: '^(?P<time>[^ ^Z]+Z) (?P<stream>stdout|stderr) (?P<logtag>[^ ]*) ?(?P<log>.*)$'
            output: extract-metadata-from-filepath
            timestamp:
              parse_from: attributes.time
              layout: '%Y-%m-%dT%H:%M:%S.%LZ'
          - type: regex_parser
            id: extract-metadata-from-filepath
            regex: '^.*\/(?P<namespace>[^_]+)_(?P<pod_name>[^_]+)_(?P<uid>[a-f0-9\-]+)\/(?P<container_name>[^\.]+)\/(?P<restart_count>\d+)\.log$'
            parse_from: attributes["log.file.path"]
            cache:
              size: 128
          - type: move
            from: attributes.log
            to: body
          - type: move
            from: attributes.stream
            to: attributes["log.iostream"]
          - type: move
            from: attributes.container_name
            to: resource["k8s.container.name"]
          - type: move
            from: attributes.namespace
            to: resource["k8s.namespace.name"]
          - type: move
            from: attributes.pod_name
            to: resource["k8s.pod.name"]
          - type: move
            from: attributes.uid
            to: resource["k8s.pod.uid"]

    processors:
      memory_limiter:
        check_interval: 1s
        limit_mib: 200
        spike_limit_mib: 50

      # Enrich all signals with k8s metadata -- replaces Fluent-Bit kubernetes filter
      k8sattributes:
        auth_type: serviceAccount
        passthrough: false
        extract:
          metadata:
            - k8s.pod.name
            - k8s.pod.uid
            - k8s.deployment.name
            - k8s.namespace.name
            - k8s.node.name
            - k8s.pod.start_time
          labels:
            - tag_name: app
              key: app
              from: pod
            - tag_name: app.kubernetes.io/name
              key: app.kubernetes.io/name
              from: pod
        pod_association:
          - sources:
              - from: resource_attribute
                name: k8s.pod.uid
          - sources:
              - from: resource_attribute
                name: k8s.pod.name
              - from: resource_attribute
                name: k8s.namespace.name

      tail_sampling:
        decision_wait: 10s
        num_traces: 50000
        policies:
          - name: errors-policy
            type: status_code
            status_code:
              status_codes: [ERROR]
          - name: http-5xx-policy
            type: string_attribute
            string_attribute:
              key: http.status_code
              values: ["5\\d\\d"]
              enabled_regex_matching: true
          - name: probabilistic-10pct
            type: probabilistic
            probabilistic:
              sampling_percentage: 10

      batch:
        send_batch_size: 1000
        timeout: 5s

      # Stamp cluster name on every signal
      resource:
        attributes:
          - key: k8s.cluster.name
            value: eks-platform
            action: upsert

    exporters:
      # Traces -- Jaeger (intra-namespace OTLP, no auth)
      otlp/jaeger:
        endpoint: "jaeger-collector.tracing.svc.cluster.local:4317"
        tls:
          insecure: true

      # Logs -- Loki (replaces Fluent-Bit output)
      # Resource attrs k8s.namespace.name + k8s.pod.name become Loki stream labels
      loki:
        endpoint: "http://loki-gateway.loki.svc.cluster.local/loki/api/v1/push"
        default_labels_enabled:
          exporter: false
          job: true
          instance: false
          level: false
        resource_to_telemetry_conversion:
          enabled: true

      # Metrics -- Prometheus remote_write
      # Infra metrics (node-exporter, kube-state-metrics) still scraped by Prometheus
      # via ServiceMonitor; this pipeline is additive for app OTLP metrics.
      prometheusremotewrite:
        endpoint: "http://kube-prometheus-stack-prometheus.monitoring.svc.cluster.local:9090/api/v1/write"
        tls:
          insecure: true

    service:
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, k8sattributes, resource, tail_sampling, batch]
          exporters: [otlp/jaeger]

        logs:
          receivers: [otlp, filelog]
          processors: [memory_limiter, k8sattributes, resource, batch]
          exporters: [loki]

        metrics:
          receivers: [otlp]
          processors: [memory_limiter, k8sattributes, resource, batch]
          exporters: [prometheusremotewrite]
